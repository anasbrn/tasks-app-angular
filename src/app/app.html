<app-header></app-header>
<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user (select)="handleSelectUser($event)" [user]="user"></app-user>
      </li>
    }
  </ul>
  <app-tasks [name]="selectedUser?.name" [userId]="selectedUser?.id"></app-tasks>
</main>
