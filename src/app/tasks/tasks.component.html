<section id="tasks">
  <header>
    <h2>{{ name }}' Tasks</h2>
    <menu>
      <button>Add a task</button>
    </menu>
  </header>

  <ul>
    @for (task of selectedUserTasks ; track task.id) {
      <li>
        <app-task-item [task]="task" (complete)="handleOnCompleteTask($event)"></app-task-item>
      </li>
    }
  </ul>
</section>
